name: Version Up

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  version-up:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get current version
        id: current
        run: |
          version=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Current version: $version"

      - name: Calculate next version
        id: next
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"

          case "${{ inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_version="${major}.${minor}.${patch}"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"
          echo "Next version: $next_version"

      - name: Update plugin.json
        run: |
          jq --arg v "${{ steps.next.outputs.version }}" '.version = $v' \
            .claude-plugin/plugin.json > tmp.json
          mv tmp.json .claude-plugin/plugin.json

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          next_version="${{ steps.next.outputs.version }}"
          branch="chore/version-up-${next_version}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add .claude-plugin/plugin.json
          git commit -m "[chore] bump plugin version to ${next_version}"
          git push origin "$branch"

          gh pr create \
            --base main \
            --head "$branch" \
            --title "[chore] bump plugin version to ${next_version}" \
            --body "Bump plugin version from ${{ steps.current.outputs.version }} to ${next_version}.

          Merging this PR will trigger the release workflow to create the \`v${next_version}\` tag and GitHub Release."
